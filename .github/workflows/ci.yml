# ArbeitszeitCheck — lint, supply-chain audit, and frontend tests.
#
# PHPUnit requires a full Nextcloud server bootstrap (see tests/bootstrap.php).
# Run PHP tests locally via: composer test:docker  or  npm run test:php:docker
name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & security audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Validate composer.json / composer.lock
        run: composer validate --strict

      - name: Security audit (composer.lock)
        run: composer audit --locked

      - name: PHP syntax check
        run: |
          find lib tests templates -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  node:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm test

      - name: L10n placeholder check
        run: npm run check:l10n
